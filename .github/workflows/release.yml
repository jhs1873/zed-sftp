name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 校验 tag 与 extension.toml / lib.rs 版本一致
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' extension.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          LIB_VERSION=$(grep 'SERVER_VERSION' src/lib.rs | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          PKG_VERSION=$(node -p "require('./sync-server/package.json').version")
          echo "tag=$TAG_VERSION  toml=$TOML_VERSION  lib=$LIB_VERSION  pkg=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$TOML_VERSION" ] || [ "$TAG_VERSION" != "$LIB_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::版本号不一致：tag/extension.toml/lib.rs/package.json 必须相同"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync-server/package-lock.json

      - name: Install sync-server deps
        working-directory: sync-server
        run: npm ci

      - name: Build sync-server
        working-directory: sync-server
        run: npm run build

      - name: 打包 sync-server.tar.gz
        run: |
          # 只打包运行必需的产物：编译后的 JS + package.json + lock 文件
          # Zed 用 DownloadedFileType::GzipTar 解压时会按目录结构落入 work_dir/sync-server/
          # 因此 tar 内部不要再嵌一层 sync-server/ —— 让顶层就是 dist/ 和 package.json
          cd sync-server
          tar -czf ../sync-server.tar.gz dist package.json package-lock.json
          cd ..
          echo "包内容："
          tar -tzf sync-server.tar.gz | head -20
          ls -lh sync-server.tar.gz

      - name: Setup Rust（用于编译 extension.wasm）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: 编译 extension.wasm
        run: |
          cargo build --target wasm32-wasip2 --release
          cp target/wasm32-wasip2/release/zed_sftp.wasm extension.wasm
          ls -lh extension.wasm

      - name: 打包完整扩展 zip（朋友"开箱即用"分发包）
        id: bundle
        run: |
          # 解压后是 zed-sftp/ 目录，用户直接 Install Dev Extension 选这个目录即可。
          # 不包含 src/、sync-server/、target/、node_modules/ —— wasm 已编译好，sync-server 由 download_file 运行时拉取。
          mkdir -p bundle/zed-sftp
          cp extension.wasm extension.toml LICENSE README.md README.zh-CN.md CONFIGURATION.md bundle/zed-sftp/
          ZIP_NAME="zed-sftp-${GITHUB_REF_NAME}.zip"
          cd bundle && zip -r "../${ZIP_NAME}" zed-sftp/ && cd ..
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          unzip -l "${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      - name: 计算 sha256
        id: hash
        run: |
          SERVER_SHA=$(sha256sum sync-server.tar.gz | cut -d' ' -f1)
          ZIP_SHA=$(sha256sum "${{ steps.bundle.outputs.zip_name }}" | cut -d' ' -f1)
          echo "server_sha256=$SERVER_SHA" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$ZIP_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sync-server.tar.gz
            ${{ steps.bundle.outputs.zip_name }}
          generate_release_notes: true
          body: |
            ## SFTP Sync ${{ github.ref_name }}

            ### 资源说明

            | 文件 | 用途 | 谁会下 |
            |---|---|---|
            | **`zed-sftp-${{ github.ref_name }}.zip`** | 完整扩展包，开箱即用 | 想"不编译直接用"的最终用户：解压 → Zed → Install Dev Extension → 选 `zed-sftp/` 文件夹 |
            | `sync-server.tar.gz` | 扩展运行时（LSP + MCP 服务器） | 由扩展 wasm 在首次启动时通过 `download_file` 自动拉取，**用户无需手动下载** |

            ### sha256

            - `sync-server.tar.gz`: `${{ steps.hash.outputs.server_sha256 }}`
            - `zed-sftp-${{ github.ref_name }}.zip`: `${{ steps.hash.outputs.zip_sha256 }}`

            ### 一致性

            tag `${{ github.ref_name }}` 已通过 CI 校验，与 `extension.toml`、`src/lib.rs:SERVER_VERSION`、`sync-server/package.json` 的版本号严格一致。

